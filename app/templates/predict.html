<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predict — Bench.AI</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Bench<span>.</span>AI</a>
    <a href="/" class="nav-link">&larr; Назад</a>
  </nav>

  <div class="form-page">
    <div class="form-card">

      <div class="form-header">
        <h1>Твой <span>жим</span></h1>
        <p>Заполни все поля — получишь предсказание от двух моделей.</p>
      </div>

      <form id="predict-form" autocomplete="off" novalidate>
        <div class="form-body">

          <div class="field-group">
            <div class="field">
              <label for="age">Возраст <span class="unit">лет</span></label>
              <input
                id="age"
                name="age"
                type="number"
                min="14"
                max="90"
                step="1"
                placeholder="25"
                required
              />
            </div>
            <div class="field">
              <label for="body_weight">Вес тела <span class="unit">кг</span></label>
              <input
                id="body_weight"
                name="body_weight"
                type="number"
                min="40"
                max="200"
                step="0.1"
                placeholder="83.0"
                required
              />
            </div>
          </div>

          <div class="form-divider"></div>

          <div class="field-group">
            <div class="field">
              <label for="squat">Присед <span class="unit">кг</span></label>
              <input
                id="squat"
                name="squat"
                type="number"
                min="0"
                max="600"
                step="0.5"
                placeholder="200.0"
                required
              />
            </div>
            <div class="field">
              <label for="deadlift">Становая <span class="unit">кг</span></label>
              <input
                id="deadlift"
                name="deadlift"
                type="number"
                min="0"
                max="700"
                step="0.5"
                placeholder="240.0"
                required
              />
            </div>
          </div>

          <div class="form-divider"></div>

          <button id="submit-btn" type="submit" class="btn btn-primary form-submit">
            Предсказать
          </button>

        </div>
      </form>

      <div id="form-error" class="form-error"></div>

      <div id="results" class="results">
        <div class="results-card">
          <div class="results-title">Предсказание жима лёжа</div>
          <div id="results-body"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/predict.js"></script>

  <footer>
    <span class="footer-logo">Bench<span>.</span>AI</span>
    <span class="footer-note">
      Pet project &mdash; ML Powerlifting-predictor &nbsp;&middot;&nbsp;
      <a href="https://github.com/RTvenT" target="_blank" rel="noopener" class="footer-author">Andrey Kim</a>
      <a href="https://github.com/RTvenT" target="_blank" rel="noopener" class="footer-github" aria-label="GitHub">

        </svg>
      </a>
    </span>
  </footer>

</body>
</html>
